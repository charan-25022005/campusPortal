<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Portal - Login</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="split-layout">
    <div class="split-left">
      <div class="geo-art">
        <div class="geo-shape shape-1"></div>
        <div class="geo-shape shape-2"></div>
        <div class="geo-shape shape-3"></div>
        <div class="geo-shape shape-4"></div>
      </div>
    </div>
    <div class="split-right">
      <div class="auth-card glass-card">
        <h1 class="auth-title">CampusEvents</h1>
        <p class="auth-subtitle">Welcome back! Please login to your account.</p>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <input type="email" id="email" class="form-control" placeholder=" " required />
            <label class="form-label" for="email">Email Address</label>
            <span class="form-error" id="emailError"></span>
          </div>

          <div class="form-group">
            <input type="password" id="password" class="form-control" placeholder=" " required />
            <label class="form-label" for="password">Password</label>
            <span class="form-error" id="passwordError"></span>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Log In</button>
        </form>

        <div style="margin-top: 1.5rem; text-align: center;">
          <a href="register.html">Register as Student / Faculty</a>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
